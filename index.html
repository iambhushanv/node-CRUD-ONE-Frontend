                    <div class="card-header alert alert-primary text-center">
                        <h4>Medium</h4>

                    <form action="" id="blogForm">
                   <div class="card-body">
                            <div class="form-group">
                                <label for="title">Title*</label>

                            </div>
                            <div class="form-group">
                                <label for="content">Content*</label>
                                <input type="text" class="form-control" id="content">
                            </div>

                   </div>
                        <div class="card-footer">
                            <button class="btn btn-block btn-primary" id="addPost">Add Post</button>
                            <button class="btn btn-block btn-danger d-none" id="updatePost" type="button">Update
                                Post</button>

                        </div>
                    </form>

                </div>
            </div>
        </div>
    </div>
